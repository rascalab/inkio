name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build workspace
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Build examples
        run: pnpm examples:build
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm e2e
        env:
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Release smoke
        run: pnpm release:smoke
        env:
          NEXT_TELEMETRY_DISABLED: '1'
