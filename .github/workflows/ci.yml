name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      e2e: ${{ steps.filter.outputs.e2e }}
      package_smoke: ${{ steps.filter.outputs.package_smoke }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/**'
            e2e:
              - 'e2e/**'
              - 'examples/**'
              - 'packages/core/**'
              - 'packages/essential/**'
              - 'packages/advanced/**'
              - 'packages/simple/**'
              - 'packages/editor/**'
              - 'packages/image-editor/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/**'
            package_smoke:
              - 'packages/**'
              - 'scripts/release-smoke.mjs'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/**'

  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fast verify
        run: pnpm verify
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  verify-docs:
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.docs == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify docs
        run: pnpm docs:verify
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  verify-e2e:
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke
        run: pnpm e2e:verify
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  verify-package-smoke:
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main' || needs.changes.outputs.package_smoke == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package smoke
        run: pnpm package:smoke:verify
        env:
          NEXT_TELEMETRY_DISABLED: '1'
